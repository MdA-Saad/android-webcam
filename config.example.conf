# Phone webcam configuration file
# Copy to config.conf and modify as needed

# Virtual camera device (should match v4l2loopback video_nr)
VIDEO_DEVICE="/dev/videoN"

# Name shown in applications
CARD_LEVEL="Android-webcam"

# Resolution: 1920*1080, 1280*720, 640*480
# Lower resolution gives lower latency
RES="1280*720"

# Set to true to show a preview window (useful for debugging)
SHOW_PREVIEW=false
